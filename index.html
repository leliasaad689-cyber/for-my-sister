<!DOCTYPE html>
<html>
<head>
  <title>For my sister 💖</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:sans-serif;">

<h2>هتفضلي أحلى أخت في الدنيا وتفضلي معايا دايمًا؟ 🥺💖</h2>

<button onclick="yes()">Yes 💖</button>
<button onmouseover="move(this)">No 😈</button>

<script>
function yes() {
  alert("كنت عارفة إنك هتوافقي 😭💖 بحبك جدًا يا أحلى أخت 🫂");
}

function move(btn) {
  btn.style.position = "absolute";
  btn.style.top = Math.random()*400 + "px";
  btn.style.left = Math.random()*400 + "px";
}
</script>

</body>
</html>
